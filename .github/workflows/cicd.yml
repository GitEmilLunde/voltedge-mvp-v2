name: VoltEdge CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1: Domæne- og API-tests — charging-session-service
  # ============================================================
  test-charging-session:
    name: Tests — charging-session-service
    runs-on: ubuntu-latest

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r charging-session-service/requirements.txt

      - name: Kør pytest
        working-directory: charging-session-service
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Job 2: Domæne- og API-tests — load-forecast-service
  # ============================================================
  test-load-forecast:
    name: Tests — load-forecast-service
    runs-on: ubuntu-latest

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r load-forecast-service/requirements.txt

      - name: Kør pytest
        working-directory: load-forecast-service
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Job 3: Byg Docker images (kun ved push til main)
  # ============================================================
  build:
    name: Byg Docker images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-charging-session, test-load-forecast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Log ind på GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Byg og push charging-session-service
        uses: docker/build-push-action@v6
        with:
          context: ./charging-session-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/voltedge-charging-session:latest

      - name: Byg og push load-forecast-service
        uses: docker/build-push-action@v6
        with:
          context: ./load-forecast-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/voltedge-load-forecast:latest
