name: VoltEdge CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit tests — charging-session-service
    runs-on: ubuntu-latest

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Sæt Python op
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r charging-session-service/requirements.txt

      - name: Kør pytest
        working-directory: charging-session-service
        run: pytest tests/ -v

  build:
    name: Byg Docker images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Tjek kode ud
        uses: actions/checkout@v4

      - name: Log ind på GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Byg og push charging-session-service
        uses: docker/build-push-action@v6
        with:
          context: ./charging-session-service
          push: true
          tags: ghcr.io/gitemillunde/voltedge-charging-session:latest

      - name: Byg og push load-forecast-service
        uses: docker/build-push-action@v6
        with:
          context: ./load-forecast-service
          push: true
          tags: ghcr.io/gitemillunde/voltedge-load-forecast:latest
