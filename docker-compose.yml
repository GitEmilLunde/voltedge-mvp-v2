version: "3.9"

# ============================================================
# VoltEdge MVP — Docker Compose
# ============================================================
# Services:
#   mysql-charging  — MySQL til charging_session_db (port 3307)
#   mysql-forecast  — MySQL til forecast_db (port 3308)
#   charging-session-service  — REST API port 5001
#   load-forecast-service     — REST API port 5002
#   seed                      — Engangs seed af 2000 ChargingSessions
# ============================================================

services:

  # ----------------------------------------------------------
  # MySQL — charging_session_db
  # ----------------------------------------------------------
  mysql-charging:
    image: mysql:8.0
    container_name: voltedge-mysql-charging
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE:      charging_session_db
      MYSQL_USER:          voltedge
      MYSQL_PASSWORD:      voltedge_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_charging_data:/var/lib/mysql
      - ./charging-session-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uvoltedge", "-pvoltedge_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # MySQL — forecast_db
  # ----------------------------------------------------------
  mysql-forecast:
    image: mysql:8.0
    container_name: voltedge-mysql-forecast
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE:      forecast_db
      MYSQL_USER:          voltedge
      MYSQL_PASSWORD:      voltedge_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_forecast_data:/var/lib/mysql
      - ./load-forecast-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uvoltedge", "-pvoltedge_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # charging-session-service (port 5001)
  # ----------------------------------------------------------
  charging-session-service:
    build:
      context: ./charging-session-service
      dockerfile: Dockerfile
    container_name: voltedge-charging-session
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MYSQL_HOST:              mysql-charging
      MYSQL_PORT:              3306
      MYSQL_USER:              voltedge
      MYSQL_PASSWORD:          voltedge_pass
      MYSQL_DATABASE:          charging_session_db
      PORT:                    5001
      SPOT_PRICE_TIMEOUT_SEC:  5
    depends_on:
      mysql-charging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Seed — kører én gang ved opstart
  # ----------------------------------------------------------
  seed:
    build:
      context: ./charging-session-service
      dockerfile: Dockerfile
    container_name: voltedge-seed
    command: python scripts/seed.py "mysql+pymysql://voltedge:voltedge_pass@mysql-charging:3306/charging_session_db?charset=utf8mb4"
    environment:
      MYSQL_HOST:     mysql-charging
      MYSQL_PORT:     3306
      MYSQL_USER:     voltedge
      MYSQL_PASSWORD: voltedge_pass
      MYSQL_DATABASE: charging_session_db
    depends_on:
      mysql-charging:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------------------
  # load-forecast-service (port 5002)
  # ----------------------------------------------------------
  load-forecast-service:
    build:
      context: ./load-forecast-service
      dockerfile: Dockerfile
    container_name: voltedge-load-forecast
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      MYSQL_HOST:              mysql-forecast
      MYSQL_PORT:              3306
      MYSQL_USER:              voltedge
      MYSQL_PASSWORD:          voltedge_pass
      MYSQL_DATABASE:          forecast_db
      CHARGING_SESSION_URL:    http://charging-session-service:5001
      SESSION_DATA_TIMEOUT_SEC: 10
      PORT:                    5002
    depends_on:
      mysql-forecast:
        condition: service_healthy
      charging-session-service:
        condition: service_healthy

volumes:
  mysql_charging_data:
  mysql_forecast_data:
